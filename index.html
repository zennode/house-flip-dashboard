:root {

* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; min-height: 100vh; }
.header { position: sticky; top: 0; z-index: 100; background: linear-gradient(135deg, #1a1d27 0%, #0f1117 100%); border-bottom: 1px solid var(--card-border); padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
.header h1 { font-size: 1.4rem; font-weight: 700; background: linear-gradient(135deg, #818cf8, #6366f1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.header-meta { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
.header-meta .updated { color: var(--text-muted); font-size: 0.8rem; }
.stat-badge { display: inline-flex; align-items: center; gap: 6px; background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 20px; padding: 4px 12px; font-size: 0.8rem; }
.stat-badge .dot { width: 8px; height: 8px; border-radius: 50%; }
.stat-badge .dot.green { background: var(--green); }
.stat-badge .dot.blue { background: var(--blue); }
.stat-badge .dot.yellow { background: var(--yellow); }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); gap: 20px; padding: 24px; }
.card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 12px; overflow: hidden; transition: border-color 0.2s; }
.card:hover { border-color: var(--accent); }
.card-header { padding: 16px 20px; border-bottom: 1px solid var(--card-border); }
.card-header .address { font-size: 1.1rem; font-weight: 600; margin-bottom: 8px; }
.card-header .badges { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.badge.phase { background: rgba(99,102,241,0.15); color: #818cf8; border: 1px solid rgba(99,102,241,0.3); }
.badge.phase.closed { background: rgba(34,197,94,0.15); color: #4ade80; border-color: rgba(34,197,94,0.3); }
.badge.phase.rehab { background: rgba(249,115,22,0.15); color: #fb923c; border-color: rgba(249,115,22,0.3); }
.badge.source { background: rgba(59,130,246,0.1); color: #60a5fa; border: 1px solid rgba(59,130,246,0.2); font-size: 0.65rem; }
.countdown { margin-top: 8px; font-size: 0.85rem; color: var(--yellow); font-weight: 500; }
.timeline { padding: 12px 20px; border-bottom: 1px solid var(--card-border); display: flex; align-items: center; gap: 4px; }
.timeline .dot { width: 12px; height: 12px; border-radius: 50%; border: 2px solid transparent; position: relative; cursor: default; }
.timeline .dot.completed { background: var(--green); border-color: rgba(34,197,94,0.3); }
.timeline .dot.active { background: var(--blue); border-color: rgba(59,130,246,0.4); box-shadow: 0 0 8px rgba(59,130,246,0.4); }
.timeline .dot.pending { background: var(--gray); border-color: rgba(75,85,99,0.3); }
.timeline .line { flex: 1; height: 2px; background: var(--gray); min-width: 4px; }
.timeline .line.completed { background: var(--green); }
.card-body { padding: 16px 20px; }
.section { margin-bottom: 14px; }
.section:last-child { margin-bottom: 0; }
.section-title { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 6px; font-weight: 600; }
.section-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.info-item { font-size: 0.82rem; }
.info-item .label { color: var(--text-muted); font-size: 0.72rem; }
.info-item .value { font-weight: 500; }
.contact-list, .update-list, .action-list { list-style: none; }
.contact-list li, .update-list li, .action-list li { font-size: 0.8rem; padding: 3px 0; border-bottom: 1px solid rgba(42,45,58,0.5); }
.contact-list li:last-child, .update-list li:last-child, .action-list li:last-child { border-bottom: none; }
.contact-role { color: var(--text-muted); font-size: 0.72rem; }
.update-date { color: var(--accent); font-size: 0.7rem; margin-right: 6px; }
.update-source { font-size: 0.65rem; color: var(--text-muted); background: rgba(99,102,241,0.1); padding: 1px 6px; border-radius: 4px; margin-left: 4px; }
.action-list li { color: var(--yellow); }
.action-list li::before { content: "â¡ "; }
@media (max-width: 500px) { .grid { grid-template-columns: 1fr; padding: 12px; } .header { padding: 12px 16px; } }
</style>

const MILESTONES = ["Offer Made","Under Contract","Title & Escrow","Inspections","Appraisal","Financing","Repairs / Rehab","Final Walkthrough","Closing","Closed"];

function getMilestoneIndex(m) {
  const idx = MILESTONES.indexOf(m);
  return idx >= 0 ? idx : 0;
}

function daysUntil(dateStr) {
  if (!dateStr) return null;
  const parts = dateStr.split('/');
  const d = new Date(parseInt(parts[2]), parseInt(parts[0])-1, parseInt(parts[1]));
  const now = new Date();
  now.setHours(0,0,0,0);
  return Math.ceil((d - now) / (1000*60*60*24));
}

function renderTimeline(milestone) {
  const idx = getMilestoneIndex(milestone);
  let html = '';
  for (let i = 0; i < MILESTONES.length; i++) {
    const cls = i < idx ? 'completed' : i === idx ? 'active' : 'pending';
    html += '<div class="dot ' + cls + '" title="' + MILESTONES[i] + '"></div>';
    if (i < MILESTONES.length - 1) {
      html += '<div class="line ' + (i < idx ? 'completed' : '') + '"></div>';
    }
  }
  return html;
}

function renderCard(p) {
  const days = daysUntil(p.closing_date);
  const phaseClass = p.current_milestone === 'Closed' ? 'closed' : p.current_milestone.includes('Rehab') ? 'rehab' : '';

  let financialsHtml = '';
  const fKeys = Object.keys(p.financials || {});
  if (fKeys.length) {
    financialsHtml = '<div class="section"><div class="section-title">Financials</div><div class="section-grid">';
    fKeys.forEach(k => {
      const label = k.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase());
      financialsHtml += '<div class="info-item"><div class="label">' + label + '</div><div class="value">' + p.financials[k] + '</div></div>';
    });
    financialsHtml += '</div></div>';
  }

  let contactsHtml = '';
  if (p.contacts && p.contacts.length) {
    contactsHtml = '<div class="section"><div class="section-title">Key Contacts</div><ul class="contact-list">';
    p.contacts.slice(0,5).forEach(c => {
      contactsHtml += '<li>' + c.name + ' <span class="contact-role">â ' + c.role + '</span></li>';
    });
    if (p.contacts.length > 5) contactsHtml += '<li style="color:var(--text-muted)">+ ' + (p.contacts.length - 5) + ' more</li>';
    contactsHtml += '</ul></div>';
  }

  let updatesHtml = '';
  if (p.recent_updates && p.recent_updates.length) {
    updatesHtml = '<div class="section"><div class="section-title">Recent Updates</div><ul class="update-list">';
    p.recent_updates.slice(0,4).forEach(u => {
      const dateStr = u.date ? '<span class="update-date">' + u.date.replace('2026-','') + '</span>' : '';
      updatesHtml += '<li>' + dateStr + u.subject + '<span class="update-source">' + u.source + '</span></li>';
    });
    updatesHtml += '</ul></div>';
  }

  let actionsHtml = '';
  if (p.action_items && p.action_items.length) {
    actionsHtml = '<div class="section"><div class="section-title">Action Items</div><ul class="action-list">';
    p.action_items.forEach(a => { actionsHtml += '<li>' + a + '</li>'; });
    actionsHtml += '</ul></div>';
  }

  const countdownHtml = days !== null ? '<div class="countdown">' + (days <= 0 ? 'â Closing date passed' : 'â³ ' + days + ' days to closing') + '</div>' : '';

  return '<div class="card">' +
    '<div class="card-header">' +
      '<div class="address">' + p.address + '</div>' +
      '<div class="badges">' +

        p.sources.map(s => '<span class="badge source">' + s + '</span>').join('') +
      '</div>' +
      countdownHtml +
    '</div>' +
    '<div class="timeline">' + renderTimeline(p.current_milestone) + '</div>' +
    '<div class="card-body">' +
      financialsHtml + contactsHtml + updatesHtml + actionsHtml +
    '</div>' +
  '</div>';
}
