<html lang="en">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root {
      --bg: #0f1117;
      --card-bg: #1a1d27;
      --text: #e1e4e8;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --success: #3fb950;
      --warning: #d29922;
      --border: #30363d;
      --closed: #3fb950;
      --active: #58a6ff;
      --financing: #d29922;
      --repairs: #f85149;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    /* Header */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background-color: var(--card-bg);
      border-bottom: 1px solid var(--border);
      padding: 1.5rem 2rem;
      backdrop-filter: blur(10px);
      background-color: rgba(26, 29, 39, 0.95);
    }

    header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
    }

    .header-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 2rem;
      flex-wrap: wrap;
    }

    .last-updated {
      font-size: 0.875rem;
      color: var(--text-muted);
    }

    .stats-container {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .stat-badge {
      background-color: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.5rem 1rem;
      font-size: 0.875rem;
      font-weight: 500;
    }

    .stat-badge strong {
      color: var(--accent);
      font-weight: 600;
    }

    /* Main Container */
    main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem;
    }

    /* Card Grid */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
      gap: 2rem;
      margin-bottom: 3rem;
    }

    @media (max-width: 768px) {
      .cards-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (min-width: 1024px) {
      .cards-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    /* Property Card */
    .property-card {
      background-color: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.5rem;
      transition: all 0.2s ease;
    }

    .property-card:hover {
      border-color: var(--accent);
      box-shadow: 0 8px 24px rgba(88, 166, 255, 0.1);
    }

    /* Card Header */
    .card-header {
      margin-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1rem;
    }

    .card-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
      word-break: break-word;
    }

    .milestone-badge {
      display: inline-block;
      padding: 0.35rem 0.75rem;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 0.5rem;
    }

    .milestone-badge.closed {
      background-color: rgba(63, 185, 80, 0.15);
      color: var(--closed);
    }

    .milestone-badge.active {
      background-color: rgba(88, 166, 255, 0.15);
      color: var(--active);
    }

    .milestone-badge.financing {
      background-color: rgba(210, 153, 34, 0.15);
      color: var(--financing);
    }

    .milestone-badge.repairs {
      background-color: rgba(248, 81, 73, 0.15);
      color: var(--repairs);
    }

    .source-badges {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-top: 0.75rem;
    }

    .source-pill {
      display: inline-block;
      background-color: var(--bg);
      border: 1px solid var(--border);
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .source-pill.dotloop {
      background-color: rgba(88, 166, 255, 0.1);
      border-color: var(--accent);
      color: var(--accent);
    }

    .source-pill.email {
      background-color: rgba(63, 185, 80, 0.1);
      border-color: var(--success);
      color: var(--success);
    }

    .source-pill.pdf {
      background-color: rgba(248, 81, 73, 0.1);
      border-color: var(--repairs);
      color: var(--repairs);
    }

    .source-pill.venmo {
      background-color: rgba(210, 153, 34, 0.1);
      border-color: var(--financing);
      color: var(--financing);
    }

    /* Countdown */
    .countdown {
      margin-top: 0.5rem;
      font-size: 0.875rem;
      color: var(--text-muted);
    }

    .countdown strong {
      color: var(--accent);
    }

    /* Milestone Timeline */
    .milestone-timeline {
      margin: 1.5rem 0;
      padding: 1rem 0;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }

    .timeline-container {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 0.25rem;
      margin-bottom: 0.75rem;
    }

    .timeline-dot {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      min-width: 0;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-bottom: 0.5rem;
      transition: all 0.2s ease;
    }

    .dot.completed {
      background-color: var(--success);
      box-shadow: 0 0 8px rgba(63, 185, 80, 0.5);
    }

    .dot.current {
      background-color: var(--accent);
      width: 10px;
      height: 10px;
      box-shadow: 0 0 12px rgba(88, 166, 255, 0.7);
    }

    .dot.pending {
      background-color: var(--border);
    }

    .milestone-label {
      font-size: 0.65rem;
      color: var(--text-muted);
      text-align: center;
      word-break: break-word;
      line-height: 1.2;
    }

    /* Card Sections */
    .card-section {
      margin-bottom: 1.5rem;
    }

    .card-section:last-child {
      margin-bottom: 0;
    }

    .section-title {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 0.75rem;
    }

    /* Financials Grid */
    .financials-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    .financial-item {
      background-color: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.75rem;
    }

    .financial-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.3px;
      margin-bottom: 0.25rem;
    }

    .financial-value {
      font-size: 1rem;
      font-weight: 600;
      color: var(--accent);
    }

    /* Contacts List */
    .contacts-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .contact-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.875rem;
    }

    .contact-item:last-child {
      border-bottom: none;
    }

    .contact-name {
      font-weight: 500;
      color: var(--text);
    }

    .contact-role {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-align: right;
    }

    /* Important Dates */
    .dates-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .date-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.875rem;
    }

    .date-item:last-child {
      border-bottom: none;
    }

    .date-label {
      color: var(--text-muted);
    }

    .date-value {
      font-weight: 600;
      color: var(--accent);
    }

    /* Action Items */
    .action-items-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .action-item {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      padding: 0.5rem 0;
      font-size: 0.875rem;
    }

    .action-checkbox {
      margin-top: 0.2rem;
      cursor: pointer;
      accent-color: var(--accent);
      flex-shrink: 0;
    }

    .action-text {
      color: var(--text);
      line-height: 1.4;
    }

    /* Recent Updates */
    .updates-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .update-item {
      border-left: 3px solid var(--border);
      padding-left: 0.75rem;
      padding-bottom: 0.75rem;
    }

    .update-date {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.3px;
      margin-bottom: 0.25rem;
    }

    .update-subject {
      font-size: 0.875rem;
      color: var(--text);
      margin-bottom: 0.5rem;
      line-height: 1.3;
    }

    .update-source {
      display: inline-block;
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 2rem;
      color: var(--text-muted);
      font-size: 0.875rem;
      border-top: 1px solid var(--border);
      margin-top: 3rem;
    }

    /* Empty States */
    .empty-section {
      color: var(--text-muted);
      font-style: italic;
      font-size: 0.875rem;
      padding: 0.5rem 0;
    }
  </style>
</head>

    function formatDate(dateStr) {
      if (!dateStr) return '';
      const date = new Date(dateStr);
      return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function formatDateTime(isoString) {
      const date = new Date(isoString);
      return date.toLocaleDateString('en-US', {
        month: 'short',
        day: 'numeric',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function calculateDaysUntil(dateStr) {
      if (!dateStr) return null;
      const closingDate = new Date(dateStr);
      const today = new Date('2026-04-20'); // Using the data timestamp
      const diffMs = closingDate - today;
      const diffDays = Math.ceil(diffMs / (1000 * 60 * 60 * 24));
      return diffDays;

        }

        timelineHTML += `
          <div class="timeline-dot">
            <div class="${dotClass}"></div>
            <div class="milestone-label">${milestones[i]}</div>
          </div>
        `;
      }

      timelineHTML += '</div>';
      return timelineHTML;
    }

    function renderFinancials(financials) {
      if (!financials || Object.keys(financials).length === 0) {
        return '<div class="empty-section">No financials recorded</div>';
      }

      let html = '<div class="financials-grid">';
      for (const [key, value] of Object.entries(financials)) {
        const label = key.split('_').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
        const formattedValue = isNaN(value) ? value : '$' + parseInt(value).toLocaleString();
        html += `
          <div class="financial-item">
            <div class="financial-label">${label}</div>
            <div class="financial-value">${formattedValue}</div>
          </div>
        `;
      }
      html += '</div>';
      return html;
    }

    function renderContacts(contacts) {
      if (!contacts || contacts.length === 0) {
        return '<div class="empty-section">No contacts listed</div>';
      }

      let html = '<div class="contacts-list">';
      for (const contact of contacts) {
        html += `
          <div class="contact-item">
            <div class="contact-name">${contact.name}</div>
            <div class="contact-role">${contact.role}</div>
          </div>
        `;
      }
      html += '</div>';
      return html;
    }

    function renderActionItems(actionItems) {
      if (!actionItems || actionItems.length === 0) {
        return '<div class="empty-section">No action items</div>';
      }

      let html = '<div class="action-items-list">';
      for (const item of actionItems) {
        html += `
          <div class="action-item">
            <input type="checkbox" class="action-checkbox">
            <div class="action-text">${item}</div>
          </div>
        `;
      }
      html += '</div>';
      return html;
    }

    function renderRecentUpdates(updates) {
      if (!updates || updates.length === 0) {
        return '<div class="empty-section">No recent updates</div>';
      }

      const limitedUpdates = updates.slice(0, 5);
      let html = '<div class="updates-list">';

      for (const update of limitedUpdates) {
        const dateHtml = update.date ? `<div class="update-date">${update.date}</div>` : '';
        html += `
          <div class="update-item">
            ${dateHtml}
            <div class="update-subject">${update.subject}</div>
            <div class="update-source">
              <span class="source-pill ${getSourceColor(update.source)}">${update.source}</span>
            </div>
          </div>
        `;
      }

      html += '</div>';
      return html;
    }

    function renderPropertyCard(property) {
      const milestoneColor = getMilestoneColor(property.current_milestone);
      const countdownDays = calculateDaysUntil(property.closing_date);
      const countdownHtml = (countdownDays !== null && property.current_milestone !== 'Closed')
        ? `<div class="countdown">Closing in <strong>${countdownDays}</strong> day${countdownDays !== 1 ? 's' : ''}</div>`
        : '';

      const sourcesHtml = property.sources.map(source =>
        `<span class="source-pill ${getSourceColor(source)}">${source}</span>`
      ).join('');

      const hasClosingDate = property.closing_date ? `<div class="date-item"><div class="date-label">Closing Date</div><div class="date-value">${formatDate(property.closing_date)}</div></div>` : '';

      return `
        <div class="property-card">
          <div class="card-header">
            <div class="card-title">${property.address}</div>
            <div class="milestone-badge ${milestoneColor}">${property.current_milestone}</div>
            <div class="source-badges">${sourcesHtml}</div>
            ${countdownHtml}
          </div>

          <div class="milestone-timeline">
            ${renderMilestoneTimeline(property.current_milestone)}
          </div>

          ${property.financials && Object.keys(property.financials).length > 0 ? `
            <div class="card-section">
              <div class="section-title">Financials</div>
              ${renderFinancials(property.financials)}
            </div>
          ` : ''}

          ${property.contacts && property.contacts.length > 0 ? `
            <div class="card-section">
              <div class="section-title">Key Contacts</div>
              ${renderContacts(property.contacts)}
            </div>
          ` : ''}

          ${hasClosingDate ? `
            <div class="card-section">
              <div class="section-title">Important Dates</div>
              <div class="dates-list">
                ${hasClosingDate}
              </div>
            </div>
          ` : ''}

          ${property.action_items && property.action_items.length > 0 ? `
            <div class="card-section">
              <div class="section-title">Action Items</div>
              ${renderActionItems(property.action_items)}
            </div>
          ` : ''}

          ${property.recent_updates && property.recent_updates.length > 0 ? `
            <div class="card-section">
              <div class="section-title">Recent Updates</div>
              ${renderRecentUpdates(property.recent_updates)}
            </div>
          ` : ''}
        </div>
      `;
    }

    function calculateStats() {
      const total = data.properties.length;
      let active = 0;
      let atClosing = 0;
      let inRehab = 0;

      for (const property of data.properties) {
        if (property.current_milestone === 'Closed') {
          // Don't count closed
        } else {
          active++;
        }

        if (property.current_milestone === 'Closing' || property.current_milestone === 'Title & Escrow') {
          atClosing++;
        }

        if (property.current_milestone === 'Repairs / Rehab') {
          inRehab++;
        }
      }

      return { total, active, atClosing, inRehab };
    }

    function initDashboard() {
      // Set last updated time
      document.getElementById('lastUpdatedTime').textContent = formatDateTime(data.last_updated);

      // Calculate and display stats
      const stats = calculateStats();
      document.getElementById('statTotal').textContent = stats.total;
      document.getElementById('statActive').textContent = stats.active;
      document.getElementById('statClosing').textContent = stats.atClosing;
      document.getElementById('statRehab').textContent = stats.inRehab;

      // Render property cards
      const container = document.getElementById('cardsContainer');
      container.innerHTML = data.properties.map(property => renderPropertyCard(property)).join('');

      // Add checkbox interactivity
      document.querySelectorAll('.action-checkbox').forEach(checkbox => {
        checkbox.addEventListener('change', function() {
          const text = this.nextElementSibling;
          if (this.checked) {
            text.style.textDecoration = 'line-through';
            text.style.color = 'var(--text-muted)';
          } else {
            text.style.textDecoration = 'none';
            text.style.color = 'var(--text)';
          }
        });
      });
    }

    // Initialize dashboard when DOM is ready
    document.addEventListener('DOMContentLoaded', initDashboard);
  </script>
</body>
</html>
