<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>House Flip Closing Coordinator</title>
<style>
:root { --bg:#0f1117; --card-bg:#1a1d27; --text:#e2e8f0; --dim:#94a3b8; --border:#2d3348; }
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh}
.hdr{position:sticky;top:0;z-index:100;background:linear-gradient(135deg,#1e293b,#0f172a);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.hdr h1{font-size:1.3rem;font-weight:700;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr-meta{display:flex;gap:16px;align-items:center;flex-wrap:wrap}
.stat{background:rgba(255,255,255,.05);padding:6px 14px;border-radius:8px;font-size:.85rem}
.stat b{color:#60a5fa}
.upd{font-size:.75rem;color:var(--dim)}
.cnt{max-width:1200px;margin:0 auto;padding:20px;display:flex;flex-direction:column;gap:20px}
.card{background:var(--card-bg);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.ch{padding:16px 20px;border-bottom:1px solid var(--border)}
.ar{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
.ar h2{font-size:1.1rem;font-weight:600}
.pb{padding:4px 12px;border-radius:20px;font-size:.75rem;font-weight:600;color:#fff;white-space:nowrap}
.mr{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.sbs{display:flex;gap:6px}
.sb{padding:2px 8px;border-radius:10px;font-size:.65rem;font-weight:600;color:#fff}
.cd{font-size:.8rem;font-weight:600;color:#22c55e}.cd.p{color:#6b7280}.cd.t{color:#ef4444;animation:pu 1s infinite}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.5}}
.tl{padding:12px 20px;border-bottom:1px solid var(--border);overflow-x:auto}
.dr{display:flex;gap:8px;justify-content:center;align-items:center;min-width:fit-content}
.mlr{display:flex;gap:8px;justify-content:center;margin-bottom:4px;min-width:fit-content}
.ml{font-size:.55rem;color:var(--dim);text-align:center;width:28px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dot{width:28px;height:10px;border-radius:5px}.dot.c{background:#22c55e}.dot.a{background:#3b82f6;box-shadow:0 0 8px rgba(59,130,246,.5)}.dot.p{background:#374151}
.cg{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border)}
.cg .sec{background:var(--card-bg);padding:14px 18px}
.sec h3{font-size:.75rem;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.us{padding:14px 18px}
.fi,.ci,.di{display:flex;justify-content:space-between;padding:3px 0;font-size:.82rem}
.fl,.cr,.dl{color:var(--dim)}.fv{font-weight:600;color:#22c55e}.cn{font-weight:500}.dv{font-weight:500}
.ai{font-size:.82rem;padding:3px 0;color:#fbbf24}
.ui{display:flex;gap:8px;align-items:flex-start;padding:4px 0;font-size:.8rem;flex-wrap:wrap}
.ud{color:var(--dim);font-size:.72rem;min-width:75px}
.ub{padding:1px 6px;border-radius:8px;font-size:.6rem;font-weight:600;color:#fff;white-space:nowrap}
.ub.email{background:#8b5cf6}.ub.pdf{background:#ef4444}.ub.dotloop{background:#00b4d8}.ub.venmo{background:#008cff}
.ut{flex:1;min-width:200px}
.em{font-size:.8rem;color:var(--dim);font-style:italic}
@media(max-width:640px){.cg{grid-template-columns:1fr}.hdr{padding:12px 16px}.cnt{padding:12px}}
</style>
</head>
<body>
<div class="hdr"><div><h1>House Flip Closing Coordinator</h1><div class="upd" id="ts"></div></div><div class="hdr-meta" id="stats"></div></div>
<div class="cnt" id="app"></div>
<script>const MS=['Offer Made','Under Contract','Title & Escrow','Inspections','Appraisal','Financing','Repairs / Rehab','Final Walkthrough','Closing','Closed'];
const PC={'Offer Made':'#f59e0b','Under Contract':'#f97316','Title & Escrow':'#8b5cf6','Inspections':'#06b6d4','Appraisal':'#14b8a6','Financing':'#3b82f6','Repairs / Rehab':'#ef4444','Final Walkthrough':'#22c55e','Closing':'#10b981','Closed':'#6b7280'};
const SC={'dotloop':'#00b4d8','DocuSign':'#ffd700','Email':'#8b5cf6','PDF':'#ef4444','Venmo':'#008cff'};
function mi(m){return MS.indexOf(m)}
function dots(m){let i=mi(m);return MS.map((s,j)=>'<div class="dot '+(j<i?'c':j===i?'a':'p')+'" title="'+s+'"></div>').join('')}
function mls(){return MS.map(s=>'<span class="ml">'+s+'</span>').join('')}
function sbs(ss){return ss.map(s=>'<span class="sb" style="background:'+(SC[s]||'#666')+'">'+s+'</span>').join('')}
function cd(d){if(!d)return '';let p=new Date(d.replace(/(\d+)\/(\d+)\/(\d+)/,'$3-$1-$2'));let t=new Date();t.setHours(0,0,0,0);let df=Math.round((p-t)/864e5);if(df<0)return '<div class="cd p">Closed '+Math.abs(df)+'d ago</div>';if(df===0)return '<div class="cd t">CLOSING TODAY</div>';return '<div class="cd">'+df+'d to closing</div>'}
function fin(f){let k=Object.keys(f);if(!k.length)return '<div class="em">No financial data yet</div>';return k.map(key=>{let l=key.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());let v=isNaN(f[key])?f[key]:'$'+Number(f[key]).toLocaleString();return '<div class="fi"><span class="fl">'+l+'</span><span class="fv">'+v+'</span></div>'}).join('')}
function con(c){if(!c||!c.length)return '<div class="em">No contacts listed</div>';return c.map(x=>'<div class="ci"><span class="cn">'+x.name+'</span><span class="cr">'+x.role+'</span></div>').join('')}
function dts(p){let r='';if(p.closing_date)r+='<div class="di"><span class="dl">Closing</span><span class="dv">'+p.closing_date+'</span></div>';return r||'<div class="em">No dates set</div>'}
function ais(a){if(!a||!a.length)return '<div class="em">No action items</div>';return a.map(x=>'<div class="ai">\u2022 '+x+'</div>').join('')}
function ups(u){if(!u||!u.length)return '<div class="em">No recent updates</div>';return u.slice(0,5).map(x=>'<div class="ui"><span class="ud">'+(x.date||'')+'</span><span class="ub '+(x.source||'').toLowerCase().replace(/ /g,'')+'">'+(x.source||'')+'</span><span class="ut">'+x.subject+'</span></div>').join('')}
function render(data){
  document.getElementById('ts').textContent='Last updated: '+data.last_updated;
  let ps=data.properties,active=0,closing=0,rehab=0;
  ps.forEach(p=>{if(p.current_milestone!=='Closed')active++;if(p.current_milestone==='Closing'||p.current_milestone==='Final Walkthrough')closing++;if(p.current_milestone==='Repairs / Rehab')rehab++});
  document.getElementById('stats').innerHTML='<div class="stat">Active: <b>'+active+'</b></div><div class="stat">At Closing: <b>'+closing+'</b></div><div class="stat">In Rehab: <b>'+rehab+'</b></div>';
  document.getElementById('app').innerHTML=ps.map(p=>'<div class="card"><div class="ch"><div class="ar"><h2>'+p.address+'</h2><span class="pb" style="background:'+(PC[p.current_milestone]||'#6b7280')+'">'+p.current_milestone+'</span></div><div class="mr"><div class="sbs">'+sbs(p.sources||[])+'</div>'+cd(p.closing_date)+'</div></div><div class="tl"><div class="mlr">'+mls()+'</div><div class="dr">'+dots(p.current_milestone)+'</div></div><div class="cg"><div class="sec"><h3>Financials</h3>'+fin(p.financials||{})+'</div><div class="sec"><h3>Key Contacts</h3>'+con(p.contacts)+'</div><div class="sec"><h3>Important Dates</h3>'+dts(p)+'</div><div class="sec"><h3>Action Items</h3>'+ais(p.action_items)+'</div></div><div class="us"><h3>Recent Updates</h3>'+ups(p.recent_updates)+'</div></div>').join('')}
fetch('properties_data.json').then(r=>r.json()).then(render).catch(e=>{document.getElementById('app').innerHTML='<div style="color:#ef4444;padding:40px;text-align:center">Error loading data: '+e.message+'</div>'});
</script></body></html>
