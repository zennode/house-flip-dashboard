<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>House Flip Closing Coordinator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f1117;--card-bg:#1a1d27;--card-border:#2a2d3a;--text:#e4e4e7;--text-muted:#9ca3af;--accent:#3b82f6;--green:#22c55e;--yellow:#eab308;--red:#ef4444;--orange:#f97316;--purple:#a855f7}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{position:sticky;top:0;z-index:100;background:linear-gradient(135deg,#1a1d27 0%,#0f1117 100%);border-bottom:1px solid var(--card-border);padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:0.5rem}
header h1{font-size:1.4rem;font-weight:700;background:linear-gradient(135deg,#3b82f6,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-meta{display:flex;gap:1.5rem;align-items:center;font-size:0.85rem;color:var(--text-muted)}
.stat-badge{background:var(--card-bg);border:1px solid var(--card-border);border-radius:20px;padding:0.3rem 0.8rem;font-size:0.8rem}
.stat-badge .num{font-weight:700;color:var(--text)}
.main{max-width:1400px;margin:0 auto;padding:1.5rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(420px,1fr));gap:1.2rem}
.card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:12px;padding:1.2rem;transition:border-color .2s}
.card:hover{border-color:var(--accent)}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1rem}
.card-header h2{font-size:1.05rem;font-weight:600;line-height:1.3}
.phase-badge{font-size:0.7rem;font-weight:600;padding:0.25rem 0.6rem;border-radius:20px;white-space:nowrap;text-transform:uppercase;letter-spacing:0.03em}
.phase-closing{background:rgba(34,197,94,0.15);color:#4ade80}
.phase-rehab{background:rgba(249,115,22,0.15);color:#fb923c}
.phase-financing{background:rgba(234,179,8,0.15);color:#facc15}
.phase-contract{background:rgba(59,130,246,0.15);color:#60a5fa}
.phase-inspection{background:rgba(168,85,247,0.15);color:#c084fc}
.phase-default{background:rgba(156,163,175,0.15);color:#9ca3af}
.source-badges{display:flex;gap:0.4rem;margin-bottom:0.8rem;flex-wrap:wrap}
.source-badge{font-size:0.65rem;padding:0.15rem 0.5rem;border-radius:10px;background:rgba(59,130,246,0.1);color:var(--accent);border:1px solid rgba(59,130,246,0.2)}
.countdown{text-align:center;margin:0.8rem 0;padding:0.6rem;background:rgba(34,197,94,0.08);border:1px solid rgba(34,197,94,0.2);border-radius:8px}
.countdown .days{font-size:1.8rem;font-weight:800;color:var(--green)}
.countdown .days.urgent{color:var(--red)}
.countdown .days.soon{color:var(--yellow)}
.countdown .label{font-size:0.75rem;color:var(--text-muted);margin-top:0.2rem}
.timeline{display:flex;align-items:center;gap:0;margin:0.8rem 0;justify-content:space-between;position:relative}
.timeline::before{content:'';position:absolute;top:50%;left:6px;right:6px;height:2px;background:var(--card-border);z-index:0}
.dot{width:12px;height:12px;border-radius:50%;position:relative;z-index:1;flex-shrink:0;cursor:default}
.dot.completed{background:var(--green)}
.dot.active{background:var(--accent);box-shadow:0 0 8px rgba(59,130,246,0.5)}
.dot.pending{background:var(--card-border)}
.dot-label{position:absolute;top:16px;left:50%;transform:translateX(-50%);font-size:0.55rem;color:var(--text-muted);white-space:nowrap;display:none}
.dot:hover .dot-label{display:block}
.section{margin-top:0.8rem}
.section-title{font-size:0.7rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);margin-bottom:0.4rem;padding-bottom:0.3rem;border-bottom:1px solid var(--card-border)}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.8rem}
.info-item{font-size:0.8rem}
.info-item .key{color:var(--text-muted);font-size:0.7rem}
.info-item .val{font-weight:500;margin-top:0.1rem}
.contact-list,.update-list,.action-list{list-style:none;font-size:0.8rem}
.contact-list li,.update-list li,.action-list li{padding:0.25rem 0;display:flex;justify-content:space-between}
.contact-list li .role{color:var(--text-muted);font-size:0.7rem}
.update-list li{flex-direction:column;gap:0.1rem}
.update-list .src{font-size:0.65rem;color:var(--accent)}
.empty{color:var(--text-muted);font-style:italic;font-size:0.8rem}
@media(max-width:500px){.grid{grid-template-columns:1fr}.header-meta{flex-wrap:wrap}}
</style>
</head>
<body>
<header>
  <h1>House Flip Closing Coordinator</h1>
  <div class="header-meta">
    <span>Updated: <strong id="lastUpdated"></strong></span>
    <span class="stat-badge">Active: <span class="num" id="statActive">0</span></span>
    <span class="stat-badge">At Closing: <span class="num" id="statClosing">0</span></span>
    <span class="stat-badge">In Rehab: <span class="num" id="statRehab">0</span></span>
  </div>
</header>
<div class="main">
  <div class="grid" id="grid"></div>
</div>
<script>
const DATA = {"last_updated":"2026-04-11T08:30:00-04:00","properties":[{"address":"297 Breckwood Blvd, Springfield, MA 01109","current_milestone":"Closing","closing_date":"4/13/2026","sources":["dotloop","Email"],"contacts":[{"name":"Alice Kempf","role":"Agent"},{"name":"David Burstein","role":"Attorney"},{"name":"Jessica Sicard","role":"Project Manager"}],"financials":{},"recent_updates":[{"subject":"Repairs priority","source":"Email"},{"subject":"FHA Amendatory signed","source":"dotloop"}]},{"address":"29 Chestnut Dr, Belchertown, MA 01007","current_milestone":"Closing","closing_date":"4/14/2026","sources":["dotloop","Email"],"contacts":[{"name":"Alice Kempf","role":"Agent"},{"name":"David Burstein","role":"Attorney"},{"name":"Jessica Sicard","role":"Project Manager"}],"financials":{},"recent_updates":[{"subject":"PSA signed via dotloop","source":"dotloop"},{"subject":"Pioneer Valley Oil invoice","source":"Email"}]},{"address":"1874 Home Rd, Sheffield, MA","current_milestone":"Repairs / Rehab","closing_date":null,"sources":["Email","PDF"],"contacts":[{"name":"Alice Kempf","role":"Agent"},{"name":"Mahari Miller","role":"Contractor"}],"financials":{"wire_amount":"$34,355","potential_arv":"$600,000"},"recent_updates":[{"subject":"Refinance HUD-1","source":"PDF"},{"subject":"Scope sent to contractor","source":"Email"}]},{"address":"40 Roland St, Pittsfield, MA 01201","current_milestone":"Repairs / Rehab","closing_date":null,"sources":["Email"],"contacts":[],"financials":{},"recent_updates":[]},{"address":"1 Richmond Ln, Pittsfield, MA","current_milestone":"Repairs / Rehab","closing_date":null,"sources":["Email"],"contacts":[{"name":"J.M. Koenig","role":"Contractor"}],"financials":{"repair_budget":"$4,000"},"recent_updates":[{"subject":"Electrical pending","source":"Email"}]},{"address":"583 Hawks Spur","current_milestone":"Repairs / Rehab","closing_date":null,"sources":["Email","Venmo"],"contacts":[{"name":"Jessica Sicard","role":"PM"}],"financials":{"repair_budget":"$5,460"},"recent_updates":[{"subject":"Reimbursement","source":"Email"}]},{"address":"4 School St, Ware, MA","current_milestone":"Financing","closing_date":"4/16/2026","sources":["Email","PDF"],"contacts":[{"name":"David Burstein","role":"Attorney"},{"name":"David Chase","role":"Lender"}],"financials":{"closing_costs":"$34,355"},"recent_updates":[{"subject":"Loan documents from Freedom CU","source":"PDF"},{"subject":"Closing date 4/16","source":"Email"}]},{"address":"21 Holly St, Greenfield, MA","current_milestone":"Under Contract","closing_date":null,"sources":["Email","PDF"],"contacts":[{"name":"David Burstein","role":"Attorney"}],"financials":{},"recent_updates":[{"subject":"Sale initiated","source":"Email"},{"subject":"Draft PS sent","source":"Email"}]}]};

const MILESTONES = ["Offer Made","Under Contract","Title & Escrow","Inspections","Appraisal","Financing","Repairs / Rehab","Final Walkthrough","Closing","Closed"];

function phaseClass(m){
  if(m==="Closing"||m==="Closed") return "phase-closing";
  if(m==="Repairs / Rehab") return "phase-rehab";
  if(m==="Financing") return "phase-financing";
  if(m==="Under Contract"||m==="Title & Escrow") return "phase-contract";
  if(m==="Inspections"||m==="Appraisal") return "phase-inspection";
  return "phase-default";
}

function daysUntil(dateStr){
  if(!dateStr) return null;
  const parts = dateStr.split('/');
  const d = new Date(parts[2], parts[0]-1, parts[1]);
  const now = new Date(); now.setHours(0,0,0,0);
  return Math.ceil((d-now)/(1000*60*60*24));
}

function formatDate(d){
  return new Date(d).toLocaleString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit'});
}

function renderTimeline(current){
  const idx = MILESTONES.indexOf(current);
  return MILESTONES.map((m,i)=>{
    let cls = 'dot ';
    if(i<idx) cls+='completed';
    else if(i===idx) cls+='active';
    else cls+='pending';
    return '<div class="'+cls+'" title="'+m+'"><span class="dot-label">'+m+'</span></div>';
  }).join('');
}

function renderCard(p){
  const days = daysUntil(p.closing_date);
  let countdownHtml = '';
  if(days !== null){
    let cls = days<=1?'urgent':days<=3?'soon':'';
    countdownHtml = '<div class="countdown"><div class="days '+cls+'">'+days+'</div><div class="label">days to closing'+(p.closing_date?' ('+p.closing_date+')':'')+'</div></div>';
  }
  const sourceBadges = p.sources.map(function(s){return '<span class="source-badge">'+s+'</span>';}).join('');
  const finKeys = Object.keys(p.financials||{});
  const finHtml = finKeys.length ? '<div class="info-grid">'+finKeys.map(function(k){return '<div class="info-item"><div class="key">'+k.replace(/_/g,' ')+'</div><div class="val">'+p.financials[k]+'</div></div>';}).join('')+'</div>' : '<div class="empty">No financial data yet</div>';
  const contactsHtml = p.contacts.length ? '<ul class="contact-list">'+p.contacts.map(function(c){return '<li><span>'+c.name+'</span><span class="role">'+c.role+'</span></li>';}).join('')+'</ul>' : '<div class="empty">No contacts listed</div>';
  const updatesHtml = p.recent_updates.length ? '<ul class="update-list">'+p.recent_updates.map(function(u){return '<li><span>'+u.subject+'</span><span class="src">'+u.source+'</span></li>';}).join('')+'</ul>' : '<div class="empty">No recent updates</div>';

  return '<div class="card"><div class="card-header"><h2>'+p.address+'</h2><span class="phase-badge '+phaseClass(p.current_milestone)+'">'+p.current_milestone+'</span></div><div class="source-badges">'+sourceBadges+'</div>'+countdownHtml+'<div class="timeline">'+renderTimeline(p.current_milestone)+'</div><div class="info-grid"><div class="section"><div class="section-title">Financials</div>'+finHtml+'</div><div class="section"><div class="section-title">Key Contacts</div>'+contactsHtml+'</div></div><div class="info-grid"><div class="section"><div class="section-title">Recent Updates</div>'+updatesHtml+'</div><div class="section"><div class="section-title">Important Dates</div>'+(p.closing_date?'<div class="info-item"><div class="key">Closing Date</div><div class="val">'+p.closing_date+'</div></div>':'<div class="empty">No dates set</div>')+'</div></div></div>';
}

var sorted = DATA.properties.slice().sort(function(a,b){
  var da = daysUntil(a.closing_date), db = daysUntil(b.closing_date);
  if(da!==null && db!==null) return da-db;
  if(da!==null) return -1;
  if(db!==null) return 1;
  return MILESTONES.indexOf(b.current_milestone)-MILESTONES.indexOf(a.current_milestone);
});

document.getElementById('lastUpdated').textContent = formatDate(DATA.last_updated);
document.getElementById('statActive').textContent = DATA.properties.length;
document.getElementById('statClosing').textContent = DATA.properties.filter(function(p){return p.current_milestone==='Closing';}).length;
document.getElementById('statRehab').textContent = DATA.properties.filter(function(p){return p.current_milestone==='Repairs / Rehab';}).length;
document.getElementById('grid').innerHTML = sorted.map(renderCard).join('');
</script>
</body>
</html>
