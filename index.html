<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>House Flip Closing Coordinator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f1117;color:#e2e8f0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
.header{position:sticky;top:0;z-index:100;background:#0f1117;border-bottom:1px solid #2a2d37;padding:16px 24px}
.header h1{font-size:22px;color:#f1f5f9}
.subtitle{color:#64748b;font-size:13px;margin-top:4px}
.stats{display:flex;gap:16px;margin-top:12px;flex-wrap:wrap}
.stat{background:#1a1d27;padding:8px 16px;border-radius:8px;text-align:center;min-width:100px}
.stat .num{font-size:24px;font-weight:700;color:#60a5fa}
.stat .label{font-size:11px;color:#94a3b8;text-transform:uppercase;letter-spacing:0.5px}
.container{max-width:1000px;margin:0 auto;padding:20px}
.card{background:#1a1d27;border-radius:12px;padding:20px;margin-bottom:20px;border:1px solid #2a2d37}
.card h2{color:#f1f5f9;font-size:18px;margin:0 0 4px 0}
.badge{display:inline-block;color:white;padding:3px 12px;border-radius:20px;font-size:12px;font-weight:600}
.src-badge{display:inline-block;background:#1e293b;color:#94a3b8;padding:2px 8px;border-radius:4px;font-size:11px;margin-right:4px}
.countdown{font-size:14px;font-weight:600;margin-top:4px}
.section{background:#0f1117;padding:10px;border-radius:6px;margin-top:8px}
.section-title{color:#60a5fa;font-size:12px;font-weight:600;margin-bottom:6px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:8px}
.milestone{display:inline-block;width:12px;height:12px;border-radius:50%;margin:0 3px}
.milestone-legend{color:#64748b;font-size:10px;margin-top:4px}
.item{margin-bottom:4px;padding-left:16px;position:relative}
.item::before{position:absolute;left:0;color:#f59e0b;content:"â¸"}
.update{margin-bottom:6px;padding-left:16px;position:relative}
.update::before{position:absolute;left:0;color:#3b82f6;content:"â¢"}
.update-date{color:#64748b;font-size:11px}
.update-text{color:#cbd5e1;font-size:13px}
.contact{margin-bottom:3px}
.contact-name{color:#e2e8f0}
.contact-role{color:#64748b}
.fin-row{margin-bottom:4px}
.fin-label{color:#94a3b8}
.fin-value{color:#e2e8f0}
.muted{color:#64748b}
@media(max-width:768px){.header h1{font-size:18px}.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="header">
<h1>ð  House Flip Closing Coordinator</h1>
<div class="subtitle" id="subtitle">Loading...</div>
<div class="stats" id="stats"></div>
</div>
<div class="container" id="container">Loading properties...</div>
<script>
const STAGES=['Offer Made','Under Contract','Title & Escrow','Inspections','Appraisal','Financing','Repairs / Rehab','Final Walkthrough','Closing','Closed'];
const STAGE_COLORS={'Offer Made':'#f59e0b','Under Contract':'#f59e0b','Title & Escrow':'#a78bfa','Inspections':'#60a5fa','Appraisal':'#60a5fa','Financing':'#ef4444','Repairs / Rehab':'#22c55e','Final Walkthrough':'#14b8a6','Closing':'#14b8a6','Closed':'#64748b'};
function daysTo(d){if(!d)return null;const t=new Date(d),n=new Date();return Math.ceil((t-n)/(1000*60*60*24))}
function renderMilestones(stage){
  const idx=STAGES.indexOf(stage);
  return STAGES.map((s,i)=>{
    const c=i<idx?'#22c55e':i===idx?'#3b82f6':'#374151';
    return `<span title="${s}" class="milestone" style="background:${c}"></span>`;
  }).join('')+`<div class="milestone-legend">${STAGES.map(s=>s.replace('Repairs / Rehab','Rehab').replace('Final Walkthrough','Walkthrough')).join(' â ')}</div>`;
}
function renderCard(p){
  const days=daysTo(p.closing_date);
  const daysColor=days!==null&&days<=7?'#ef4444':days!==null&&days<=14?'#f59e0b':'#94a3b8';
  const stage=p.current_milestone||p.current_stage||'Unknown';
  const badgeColor=STAGE_COLORS[stage]||'#60a5fa';
  let html=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px"><div><h2>${p.address}</h2><span class="badge" style="background:${badgeColor}">${stage}</span> `;
  const srcs=p.sources||p.data_sources||[];
  if(srcs.length)srcs.forEach(s=>{html+=`<span class="src-badge">${s}</span> `});
  html+=`</div></div>`;
  if(days!==null)html+=`<div class="countdown" style="color:${daysColor}">â± ${days} days to closing (${new Date(p.closing_date).toLocaleDateString()})</div>`;
  html+=`<div style="margin:12px 0 8px;padding:8px 0">${renderMilestones(stage)}</div>`;
  html+=`<div class="grid">`;
  if(p.financials&&Object.keys(p.financials).length){
    html+=`<div class="section"><div class="section-title">ð° FINANCIALS</div>`;
    for(const[k,v]of Object.entries(p.financials))html+=`<div class="fin-row"><span class="fin-label">${k}:</span> <span class="fin-value">${v}</span></div>`;
    html+=`</div>`;
  }
  if(p.contacts&&p.contacts.length){
    const show=p.contacts.slice(0,6),more=p.contacts.length-6;
    html+=`<div class="section"><div class="section-title">ð¥ KEY CONTACTS</div>`;
    show.forEach(c=>{html+=`<div class="contact"><span class="contact-name">${c.name}</span> <span class="contact-role">â ${c.role}</span></div>`});
    if(more>0)html+=`<div class="muted">+${more} more</div>`;
    html+=`</div>`;
  }
  html+=`</div>`;
  const actions=p.action_items||[];
  if(actions.length){
    html+=`<div class="section"><div class="section-title">ð ACTION ITEMS</div>`;
    actions.forEach(a=>{html+=`<div class="item">${a}</div>`});
    html+=`</div>`;
  }
  const updates=p.recent_updates||p.updates||[];
  if(updates.length){
    const show=updates.slice(0,4),more=updates.length-4;
    html+=`<div class="section"><div class="section-title">ð¬ RECENT UPDATES</div>`;
    show.forEach(u=>{html+=`<div class="update"><span class="update-date">${u.date} [${u.source||'Email'}]</span><br><span class="update-text">${u.summary||u.subject||''}</span></div>`});
    if(more>0)html+=`<div class="muted" style="padding-left:16px">+${more} more updates</div>`;
    html+=`</div>`;
  }
  html+=`</div>`;
  return html;
}
fetch('properties_data.json').then(r=>r.json()).then(data=>{
  document.getElementById('subtitle').textContent=`Last updated: ${data.last_updated} | ${data.properties.length} properties tracked`;
  const ms=p=>p.current_milestone||p.current_stage||'';
  const active=data.properties.filter(p=>ms(p)!=='Closed');
  const closing=active.filter(p=>['Final Walkthrough','Closing'].includes(ms(p)));
  const rehab=active.filter(p=>ms(p)==='Repairs / Rehab');
  const closed=data.properties.filter(p=>ms(p)==='Closed');
  document.getElementById('stats').innerHTML=
    `<div class="stat"><div class="num">${active.length}</div><div class="label">Active</div></div>`+
    `<div class="stat"><div class="num" style="color:#14b8a6">${closing.length}</div><div class="label">At Closing</div></div>`+
    `<div class="stat"><div class="num" style="color:#22c55e">${rehab.length}</div><div class="label">In Rehab</div></div>`+
    `<div class="stat"><div class="num" style="color:#64748b">${closed.length}</div><div class="label">Closed</div></div>`;
  const sorted=[...data.properties].sort((a,b)=>{
    if(!a.closing_date)return 1;if(!b.closing_date)return -1;
    return new Date(a.closing_date)-new Date(b.closing_date);
  });
  document.getElementById('container').innerHTML=sorted.map(renderCard).join('');
}).catch(e=>{document.getElementById('container').innerHTML=`<div style="color:#ef4444;padding:20px">Error loading data: ${e.message}</div>`});
</script>
</body>
</html>
