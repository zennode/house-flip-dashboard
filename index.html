function sortProps(a, b) {
  const order = {"Final Walkthrough":0,"Closing":1,"Financing":2,"Inspections":3,"Appraisal":4,"Title & Escrow":5,"Under Contract":6,"Repairs / Rehab":7,"Offer Made":8,"Prospecting":9,"Closed":10};
  const oa = order[a.current_milestone] ?? 8;
  const ob = order[b.current_milestone] ?? 8;
  if (oa !== ob) return oa - ob;
  if (a.closing_date && b.closing_date) return daysUntil(a.closing_date) - daysUntil(b.closing_date);
  if (a.closing_date) return -1;
  return 1;
}

data.properties.sort(sortProps);

const container = document.getElementById('cards');
data.properties.forEach(p => {
  const mi = getMilestoneIndex(p.current_milestone);
  const isProspecting = p.current_milestone === "Prospecting";
  let timelineDots = '';
  if (!isProspecting) {
    for (let i = 0; i < 10; i++) {
      const cls = i < mi ? 'completed' : i === mi ? 'active' : 'pending';
      timelineDots += '<div class="dot ' + cls + '" title="' + MILESTONES[i] + '"></div>';
      if (i < 9) timelineDots += '<div class="line"></div>';
    }
  }
  const days = daysUntil(p.closing_date);
  let countdownHtml = '';
  if (days !== null && p.current_milestone !== "Closed") {
    if (days < 0) countdownHtml = '<div class="countdown" style="color:var(--red)">Closing was ' + Math.abs(days) + ' days ago!</div>';
    else if (days === 0) countdownHtml = '<div class="countdown" style="color:var(--red)">CLOSING TODAY!</div>';
    else countdownHtml = '<div class="countdown">' + days + ' days to closing (' + p.closing_date + ')</div>';
  }
  let financialsHtml = '';
  const f = p.financials || {};
  const fKeys = Object.keys(f);
  if (fKeys.length > 0) {
    financialsHtml = '<div class="section-title">Financials</div><div class="info-grid">';
    const labels = {purchase_price:'Purchase',rehab_budget:'Rehab Budget',total_loan:'Total Loan',funds_at_closing:'At Closing',construction_advances:'Construction $',points:'Points',rate:'Rate',term:'Term',deposit:'Deposit',lender_fees:'Lender Fees',closing_costs:'Closing Costs',wire_amount:'Wire Amount',potential_arv:'ARV',repair_budget:'Repair Budget',capx_loan:'CapX Loan',owed_to_yb:'Owed to YB',total_investment:'Total Investment'};
    fKeys.forEach(k => {
      const label = labels[k] || k;
      const val = ['rate','term'].includes(k) ? f[k] : fmt(f[k]);
      financialsHtml += '<div class="info-item"><span class="label">' + label + ':</span> <span class="value">' + val + '</span></div>';
    });
    financialsHtml += '</div>';
  }
  let contactsHtml = '';
  if (p.contacts && p.contacts.length) {
    contactsHtml = '<div class="section-title">Key Contacts</div><ul class="contact-list">';
    p.contacts.slice(0,5).forEach(c => {
      contactsHtml += '<li><strong>' + c.name + '</strong> <span style="color:var(--text-muted)">â ' + c.role + '</span></li>';
    });
    if (p.contacts.length > 5) contactsHtml += '<li style="color:var(--text-muted)">+ ' + (p.contacts.length - 5) + ' more</li>';
    contactsHtml += '</ul>';
  }
  let updatesHtml = '';
  if (p.recent_updates && p.recent_updates.length) {
    updatesHtml = '<div class="section-title">Recent Updates</div><ul class="update-list">';
    p.recent_updates.slice(0,4).forEach(u => {
      const dateTag = u.date ? '<span class="update-date">' + u.date + '</span>' : '';
      updatesHtml += '<li>' + dateTag + u.subject + ' <span class="update-source">[' + u.source + ']</span></li>';
    });
    if (p.recent_updates.length > 4) updatesHtml += '<li style="color:var(--text-muted)">+ ' + (p.recent_updates.length - 4) + ' more updates</li>';
    updatesHtml += '</ul>';
  }
  let actionsHtml = '';
  if (p.action_items && p.action_items.length) {
    actionsHtml = '<div class="section-title">Action Items</div><ul class="action-list">';
    p.action_items.slice(0,4).forEach(a => { actionsHtml += '<li>' + a + '</li>'; });
    if (p.action_items.length > 4) actionsHtml += '<li style="color:var(--text-muted)">+ ' + (p.action_items.length - 4) + ' more</li>';
    actionsHtml += '</ul>';
  }
  let sourceBadges = '';
  if (p.sources && p.sources.length) {
    sourceBadges = '<div class="source-badges">';
    p.sources.forEach(s => { sourceBadges += '<span class="source-badge">' + s + '</span>'; });
    sourceBadges += '</div>';
  }
  container.innerHTML += '<div class="card"><div class="card-header"><h2>' + p.address + '</h2><span class="badge ' + getBadgeClass(p.current_milestone) + '">' + p.current_milestone + '</span></div>' + sourceBadges + countdownHtml + (timelineDots ? '<div class="timeline">' + timelineDots + '</div>' : '') + financialsHtml + contactsHtml + updatesHtml + actionsHtml + '</div>';
