<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>House Flip Closing Coordinator</title>
<style>
:root{--bg:#0f1117;--card-bg:#1a1d27;--card-border:#2a2d3a;--text:#e4e4e7;--text-muted:#9ca3af;--accent:#3b82f6;--green:#22c55e;--yellow:#eab308;--red:#ef4444;--orange:#f97316;--purple:#a855f7}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;line-height:1.5;padding:0}
.header{position:sticky;top:0;z-index:100;background:linear-gradient(135deg,#1a1d27 0%,#0f1117 100%);border-bottom:1px solid var(--card-border);padding:20px 24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.header h1{font-size:1.4rem;font-weight:700;background:linear-gradient(135deg,#3b82f6,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header-meta{display:flex;gap:16px;align-items:center;flex-wrap:wrap}
.header-meta .timestamp{color:var(--text-muted);font-size:.8rem}
.stat-badges{display:flex;gap:8px;flex-wrap:wrap}
.stat-badge{padding:4px 12px;border-radius:20px;font-size:.75rem;font-weight:600}
.stat-badge.active{background:rgba(59,130,246,.15);color:#60a5fa}
.stat-badge.closing{background:rgba(234,179,8,.15);color:#facc15}
.stat-badge.rehab{background:rgba(249,115,22,.15);color:#fb923c}
.stat-badge.closed{background:rgba(34,197,94,.15);color:#4ade80}
.stat-badge.prospect{background:rgba(168,85,247,.15);color:#c084fc}
.container{max-width:1400px;margin:0 auto;padding:24px}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(420px,1fr));gap:20px}
.card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:12px;padding:20px;transition:transform .15s,box-shadow .15s}
.card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;gap:8px}
.card-address{font-size:1.1rem;font-weight:700;flex:1}
.phase-badge{padding:4px 10px;border-radius:6px;font-size:.7rem;font-weight:700;text-transform:uppercase;white-space:nowrap}
.phase-badge.closed{background:rgba(34,197,94,.15);color:#4ade80;border:1px solid rgba(34,197,94,.3)}
.phase-badge.financing{background:rgba(234,179,8,.15);color:#facc15;border:1px solid rgba(234,179,8,.3)}
.phase-badge.title{background:rgba(59,130,246,.15);color:#60a5fa;border:1px solid rgba(59,130,246,.3)}
.phase-badge.contract{background:rgba(168,85,247,.15);color:#c084fc;border:1px solid rgba(168,85,247,.3)}
.phase-badge.rehab{background:rgba(249,115,22,.15);color:#fb923c;border:1px solid rgba(249,115,22,.3)}
.phase-badge.inspections{background:rgba(236,72,153,.15);color:#f472b6;border:1px solid rgba(236,72,153,.3)}
.phase-badge.prospecting{background:rgba(168,85,247,.1);color:#a78bfa;border:1px dashed rgba(168,85,247,.4)}
.source-badges{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap}
.source-badge{padding:2px 8px;border-radius:4px;font-size:.65rem;font-weight:600;background:rgba(255,255,255,.05);color:var(--text-muted);border:1px solid var(--card-border)}
.countdown{text-align:center;padding:8px;margin-bottom:14px;border-radius:8px;font-size:.85rem;font-weight:600}
.countdown.urgent{background:rgba(239,68,68,.1);color:#f87171;border:1px solid rgba(239,68,68,.2)}
.countdown.soon{background:rgba(234,179,8,.1);color:#facc15;border:1px solid rgba(234,179,8,.2)}
.countdown.ok{background:rgba(34,197,94,.1);color:#4ade80;border:1px solid rgba(34,197,94,.2)}
.countdown.done{background:rgba(255,255,255,.03);color:var(--text-muted);border:1px solid var(--card-border)}
.timeline{display:flex;align-items:center;gap:4px;margin-bottom:16px;padding:10px 0;justify-content:center;flex-wrap:wrap}
.timeline-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.timeline-dot.completed{background:var(--green)}
.timeline-dot.active{background:var(--accent);box-shadow:0 0 8px rgba(59,130,246,.5)}
.timeline-dot.pending{background:#374151}
.timeline-dot.prospecting-dot{background:var(--purple);box-shadow:0 0 8px rgba(168,85,247,.4)}
.timeline-line{width:8px;height:2px;flex-shrink:0}
.timeline-line.completed{background:var(--green)}
.timeline-line.pending{background:#374151}
.timeline-labels{display:flex;justify-content:space-between;font-size:.55rem;color:var(--text-muted);margin-bottom:14px;padding:0 2px}
.section{margin-bottom:12px}
.section-title{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--card-border)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.info-item{font-size:.8rem;margin-bottom:4px}
.info-label{color:var(--text-muted);font-size:.7rem}
.info-value{font-weight:600}
.contact-item{font-size:.78rem;margin-bottom:3px}
.contact-name{font-weight:600}
.contact-role{color:var(--text-muted);font-size:.7rem}
.update-item{font-size:.78rem;margin-bottom:5px;padding-left:10px;border-left:2px solid var(--card-border)}
.update-date{color:var(--accent);font-size:.7rem;font-weight:600}
.update-source{color:var(--text-muted);font-size:.65rem}
.action-item{font-size:.78rem;margin-bottom:4px;padding-left:16px;position:relative}
.action-item::before{content:"○";position:absolute;left:0;color:var(--accent)}
.no-data{color:var(--text-muted);font-size:.78rem;font-style:italic}
@media(max-width:500px){.cards{grid-template-columns:1fr}.header{flex-direction:column;align-items:flex-start}}
</style>
</head>

function getPhaseClass(m){
  if(m==="Closed")return"closed";
  if(m==="Financing"||m==="Closing"||m==="Final Walkthrough")return"financing";
  if(m==="Title & Escrow")return"title";
  if(m==="Under Contract"||m==="Offer Made")return"contract";
  if(m==="Repairs / Rehab")return"rehab";
  if(m==="Inspections"||m==="Appraisal")return"inspections";
  if(m==="Prospecting")return"prospecting";
  return"contract";
}

function daysUntil(dateStr){
  if(!dateStr)return null;
  const parts=dateStr.split("/");
  const d=new Date(parseInt(parts[2]),parseInt(parts[0])-1,parseInt(parts[1]));
  const now=new Date();now.setHours(0,0,0,0);
  return Math.ceil((d-now)/(1000*60*60*24));
}

function countdownHTML(p){
  if(p.current_milestone==="Closed"){
    return'<div class="countdown done">CLOSED'+(p.closing_date?' - '+p.closing_date:'')+'</div>';
  }
  if(!p.closing_date)return'';
  const days=daysUntil(p.closing_date);
  if(days===null)return'';
  let cls=days<=3?'urgent':days<=14?'soon':'ok';
  let label=days<0?Math.abs(days)+' days past closing':days===0?'CLOSING TODAY':days+' days to closing ('+p.closing_date+')';
  return'<div class="countdown '+cls+'">'+label+'</div>';
}

function timelineHTML(milestone){
  const isProspecting=milestone==="Prospecting";
  if(isProspecting){
    let h='<div class="timeline">';
    h+='<div class="timeline-dot prospecting-dot" title="Prospecting"></div>';
    for(let i=0;i<MILESTONES.length;i++){
      h+='<div class="timeline-line pending"></div>';
      h+='<div class="timeline-dot pending" title="'+MILESTONES[i]+'"></div>';
    }
    h+='</div>';
    return h;
  }
  const idx=MILESTONES.indexOf(milestone);
  let h='<div class="timeline">';
  for(let i=0;i<MILESTONES.length;i++){
    if(i>0)h+='<div class="timeline-line '+(i<=idx?'completed':'pending')+'"></div>';
    let cls=i<idx?'completed':i===idx?'active':'pending';
    h+='<div class="timeline-dot '+cls+'" title="'+MILESTONES[i]+'"></div>';
  }
  h+='</div>';
  h+='<div class="timeline-labels"><span>Offer</span><span>Contract</span><span>Title</span><span>Inspect</span><span>Appr</span><span>Finance</span><span>Rehab</span><span>Walk</span><span>Close</span><span>Done</span></div>';
  return h;
}

function financialsHTML(f){
  if(!f||Object.keys(f).length===0)return'<div class="no-data">No financial data yet</div>';
  let h='';
  const labels={"purchase_price":"Purchase Price","deposit":"Deposit","closing_costs":"Closing Costs","repair_budget":"Repair Budget","wire_amount":"Wire Amount","potential_arv":"Potential ARV","capx_loan":"CapX Loan","owed_to_yb":"Owed to YB"};
  for(const[k,v]of Object.entries(f)){
    const num=parseFloat(v);
    const fmt=isNaN(num)?v:'$'+num.toLocaleString();
    h+='<div class="info-item"><div class="info-label">'+(labels[k]||k)+'</div><div class="info-value">'+fmt+'</div></div>';
  }
  return h;
}

function renderCards(){
  const container=document.getElementById('cards');
  // Sort: active first (by milestone progress desc), then closed, then prospecting
  const sorted=[...data.properties].sort((a,b)=>{
    const order={"Prospecting":-1,"Closed":100};
    const ai=order[a.current_milestone]!==undefined?order[a.current_milestone]:MILESTONES.indexOf(a.current_milestone);
    const bi=order[b.current_milestone]!==undefined?order[b.current_milestone]:MILESTONES.indexOf(b.current_milestone);
    if(ai===100&&bi===100)return 0;
    if(ai===100)return 1;
    if(bi===100)return 1;
    if(ai===-1)return 1;
    if(bi===-1)return 1;
    return ai-bi;
  });
  let html='';
  for(const p of sorted){
    html+='<div class="card">';
    html+='<div class="card-header"><div class="card-address">'+p.address+'</div>';
    html+='<span class="phase-badge '+getPhaseClass(p.current_milestone)+'">'+p.current_milestone+'</span></div>';
    html+='<div class="source-badges">'+p.sources.map(s=>'<span class="source-badge">'+s+'</span>').join('')+'</div>';
    html+=countdownHTML(p);
    html+=timelineHTML(p.current_milestone);
    html+='<div class="grid-2">';
    html+='<div class="section"><div class="section-title">Financials</div>'+financialsHTML(p.financials)+'</div>';
    html+='<div class="section"><div class="section-title">Key Contacts</div>';
    if(p.contacts&&p.contacts.length>0){
      p.contacts.slice(0,5).forEach(c=>{html+='<div class="contact-item"><span class="contact-name">'+c.name+'</span> <span class="contact-role">'+c.role+'</span></div>';});
      if(p.contacts.length>5)html+='<div class="contact-item" style="color:var(--text-muted)">+'+(p.contacts.length-5)+' more</div>';
    }else{html+='<div class="no-data">No contacts</div>';}
    html+='</div></div>';
    if(p.action_items&&p.action_items.length>0){
      html+='<div class="section"><div class="section-title">Action Items</div>';
      p.action_items.forEach(a=>{html+='<div class="action-item">'+a+'</div>';});
      html+='</div>';
    }
    html+='<div class="section"><div class="section-title">Recent Updates</div>';
    if(p.recent_updates&&p.recent_updates.length>0){
      p.recent_updates.slice(0,5).forEach(u=>{
        html+='<div class="update-item">';
        if(u.date)html+='<span class="update-date">'+u.date+'</span> ';
        html+=u.subject+' <span class="update-source">['+u.source+']</span></div>';
      });
    }else{html+='<div class="no-data">No updates</div>';}
    html+='</div></div>';
  }
  container.innerHTML=html;
}
renderCards();
</script>
